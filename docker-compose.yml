services:
  web:
    image: 12tkj-harbas-web:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: 12tkj-harbas-web
    ports:
      - "8213:8213"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:8213/health | grep -q OK || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tkj-network

networks:
  tkj-network:
    driver: bridge
